name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.125.7'
          extended: true

      # - name: Setup Pages
      #   id: pages
      #   uses: actions/configure-pages@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Cache Hugo's build artifacts to keep rebuilds fast as the site grows.
      # - `resources/` holds processed assets (e.g., resized/converted images via Hugo Pipes)
      # - `HUGO_CACHEDIR` holds other internal caches
      - name: Cache Hugo
        uses: actions/cache@v4
        with:
          path: |
            resources
            ${{ runner.temp }}/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('hugo.toml', 'themes/**', 'layouts/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          # Single source of truth for URLs: hugo.toml (baseURL=https://beardefend.com/)
          hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
