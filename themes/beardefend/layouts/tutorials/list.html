{{ define "main" }}
<section class="py-16 sm:py-20 bg-dark-900">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="fade-in">
      <h1 class="text-3xl sm:text-4xl font-bold text-lime-400">{{ .Title }}</h1>
      {{ with .Params.description }}<p class="mt-3 text-neutral-300 max-w-2xl">{{ . }}</p>{{ end }}
    </div>

    {{ $p := .Paginate (.Pages.ByDate.Reverse) }}
    <div class="mt-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      {{ range $p.Pages }}
        {{ partial "card.html" . }}
      {{ end }}
    </div>

    {{ partial "pagination.html" . }}
  </div>
</section>
{{ end }}
